name: CI/CD Pipeline

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository checkout
        uses: actions/checkout@v4

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.21.0'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma
        run: npm run prisma generate

      - name: Build
        run: npm run build

      # - name: Run Tests
      #   run: npm run test

      - name: Run Lint
        run: npm run lint
